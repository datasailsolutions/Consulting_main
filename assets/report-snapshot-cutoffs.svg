<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Static report snapshot showing cutoff analysis</title>
  <desc id="desc">An anonymized report chart showing distributions, cutoffs, and classified outcomes.</desc>
  <rect width="960" height="620" fill="#f7faf8"/>
  <rect x="36" y="34" width="888" height="552" rx="22" fill="#ffffff" stroke="#d7e0de"/>
  <text x="70" y="82" fill="#b4643b" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">REPORT SNAPSHOT</text>
  <text x="70" y="118" fill="#102027" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="850">Decision-rule cutoff analysis</text>
  <text x="70" y="154" fill="#52636c" font-family="Inter, Arial, sans-serif" font-size="16">The analysis tested whether a continuous result could separate outcomes and where practical cutoffs should sit.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="70" y="198" width="390" height="310" rx="16" fill="#e8f0ed"/>
    <text x="98" y="236" fill="#083c44" font-size="20" font-weight="850">Result by group</text>
    <line x1="120" y1="456" x2="414" y2="456" stroke="#ffffff" stroke-width="2"/>
    <line x1="120" y1="262" x2="120" y2="456" stroke="#ffffff" stroke-width="2"/>
    <line x1="120" y1="334" x2="414" y2="334" stroke="#ffffff" stroke-width="1"/>
    <line x1="120" y1="382" x2="414" y2="382" stroke="#ffffff" stroke-width="1"/>
    <line x1="120" y1="364" x2="414" y2="364" stroke="#9d4edd" stroke-width="3" stroke-dasharray="10 10"/>
    <line x1="120" y1="389" x2="414" y2="389" stroke="#06a77d" stroke-width="3" stroke-dasharray="10 10"/>
    <text x="296" y="355" fill="#083c44" font-size="14">cutoff A</text>
    <text x="296" y="409" fill="#083c44" font-size="14">cutoff B</text>
    <g fill="#4c78a8" opacity="0.82">
      <circle cx="154" cy="414" r="6"/><circle cx="174" cy="390" r="6"/><circle cx="196" cy="356" r="6"/><circle cx="215" cy="337" r="6"/><circle cx="238" cy="310" r="6"/><circle cx="260" cy="286" r="6"/><circle cx="286" cy="398" r="6"/><circle cx="314" cy="370" r="6"/><circle cx="340" cy="330" r="6"/>
    </g>
    <g fill="#e45756" opacity="0.82">
      <circle cx="166" cy="431" r="6"/><circle cx="190" cy="407" r="6"/><circle cx="225" cy="379" r="6"/><circle cx="278" cy="352" r="6"/><circle cx="328" cy="390" r="6"/><circle cx="372" cy="420" r="6"/>
    </g>
    <text x="144" y="484" fill="#52636c" font-size="13">Negative</text>
    <text x="294" y="484" fill="#52636c" font-size="13">Positive</text>

    <rect x="500" y="198" width="388" height="310" rx="16" fill="#f7faf8" stroke="#d7e0de"/>
    <text x="528" y="236" fill="#083c44" font-size="20" font-weight="850">Delta-days split</text>
    <line x1="548" y1="456" x2="838" y2="456" stroke="#d7e0de" stroke-width="2"/>
    <line x1="548" y1="262" x2="548" y2="456" stroke="#d7e0de" stroke-width="2"/>
    <line x1="592" y1="262" x2="592" y2="456" stroke="#102027" stroke-width="3" stroke-dasharray="9 9"/>
    <text x="602" y="284" fill="#102027" font-size="14">best split = 0</text>
    <g fill="#4c78a8" opacity="0.78">
      <rect x="556" y="306" width="24" height="150"/><rect x="584" y="354" width="24" height="102"/><rect x="612" y="420" width="24" height="36"/><circle cx="568" cy="380" r="5"/><circle cx="584" cy="348" r="5"/><circle cx="606" cy="402" r="5"/><circle cx="640" cy="424" r="5"/>
    </g>
    <g fill="#e45756" opacity="0.72">
      <rect x="640" y="430" width="24" height="26"/><rect x="696" y="410" width="24" height="46"/><rect x="754" y="388" width="24" height="68"/><rect x="812" y="436" width="24" height="20"/><circle cx="674" cy="386" r="5"/><circle cx="720" cy="376" r="5"/><circle cx="782" cy="350" r="5"/><circle cx="825" cy="408" r="5"/>
    </g>
  </g>
</svg>
