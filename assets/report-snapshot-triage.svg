<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Static report snapshot showing grey-zone triage</title>
  <desc id="desc">An anonymized report chart showing rule-in, rule-out, and indeterminate decision zones.</desc>
  <rect width="960" height="620" fill="#f7faf8"/>
  <rect x="36" y="34" width="888" height="552" rx="22" fill="#ffffff" stroke="#d7e0de"/>
  <text x="70" y="82" fill="#b4643b" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">REPORT SNAPSHOT</text>
  <text x="70" y="118" fill="#102027" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="850">Grey-zone rule and operational triage</text>
  <text x="70" y="154" fill="#52636c" font-family="Inter, Arial, sans-serif" font-size="16">The report created a rule-in/rule-out option for high-confidence cases and flagged uncertain cases for follow-up.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="70" y="196" width="820" height="300" rx="16" fill="#f7faf8" stroke="#d7e0de"/>
    <rect x="92" y="226" width="776" height="92" fill="#dbeafe" opacity="0.72"/>
    <rect x="92" y="318" width="776" height="84" fill="#fef3c7" opacity="0.72"/>
    <rect x="92" y="402" width="776" height="70" fill="#fce7f3" opacity="0.72"/>
    <text x="110" y="285" fill="#083c44" font-size="16" font-weight="750">Rule-out zone</text>
    <text x="758" y="366" fill="#083c44" font-size="16" font-weight="750">Indeterminate</text>
    <text x="110" y="438" fill="#083c44" font-size="16" font-weight="750">Rule-in zone</text>
    <line x1="92" y1="226" x2="92" y2="472" stroke="#d7e0de"/>
    <line x1="92" y1="472" x2="868" y2="472" stroke="#d7e0de"/>
    <g fill="#4c78a8" opacity="0.76">
      <circle cx="128" cy="248" r="6"/><circle cx="142" cy="270" r="6"/><circle cx="158" cy="288" r="6"/><circle cx="176" cy="302" r="6"/><circle cx="198" cy="318" r="6"/><circle cx="222" cy="330" r="6"/><circle cx="246" cy="344" r="6"/><circle cx="276" cy="356" r="6"/><circle cx="306" cy="366" r="6"/><circle cx="340" cy="376" r="6"/><circle cx="380" cy="386" r="6"/><circle cx="420" cy="394" r="6"/><circle cx="462" cy="402" r="6"/><circle cx="508" cy="412" r="6"/><circle cx="552" cy="422" r="6"/><circle cx="596" cy="432" r="6"/><circle cx="646" cy="442" r="6"/><circle cx="704" cy="454" r="6"/>
    </g>
    <g fill="#e45756" opacity="0.72">
      <circle cx="190" cy="340" r="6"/><circle cx="258" cy="356" r="6"/><circle cx="334" cy="372" r="6"/><circle cx="424" cy="390" r="6"/><circle cx="512" cy="414" r="6"/><circle cx="570" cy="430" r="6"/><circle cx="628" cy="448" r="6"/><circle cx="690" cy="460" r="6"/><circle cx="760" cy="430" r="6"/><circle cx="826" cy="446" r="6"/>
    </g>
    <rect x="70" y="524" width="250" height="44" rx="10" fill="#083c44"/>
    <text x="92" y="552" fill="#ffffff" font-size="15" font-weight="800">Classified: 44 subjects</text>
    <rect x="342" y="524" width="226" height="44" rx="10" fill="#e8f0ed" stroke="#d7e0de"/>
    <text x="364" y="552" fill="#083c44" font-size="15" font-weight="800">Accuracy: 86.4%</text>
    <rect x="590" y="524" width="298" height="44" rx="10" fill="#fff6ec" stroke="#f1c16b"/>
    <text x="612" y="552" fill="#083c44" font-size="15" font-weight="800">Indeterminate: follow-up review</text>
  </g>
</svg>
